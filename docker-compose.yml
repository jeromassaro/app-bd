services:
  db:
    image: ghcr.io/jeromassaro/personas-db:latest
    build: ./db
    container_name: personas-db
    environment:
      POSTGRES_DB: personasdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - personas-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d personasdb"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  app:
    image: ghcr.io/jeromassaro/personas-app:latest
    build: ./app-bd
    container_name: personas-app
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: personasdb
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  personas-db-data:
  
    