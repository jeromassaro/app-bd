<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Escritura de Personas</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #2c3e50; }
        nav a { margin-right: 15px; }
        label { display: block; margin-top: 12px; font-weight: bold; }
        input { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
        button { margin-top: 20px; padding: 10px 20px; background-color: #2c3e50; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #1a252f; }
        .mensaje { margin-top: 15px; padding: 10px; background-color: #eafaf1; border: 1px solid #2ecc71; }
    </style>
</head>
<body>
    <nav>
        <a href="/leer">Leer</a>
        <a href="/escribir">Escribir</a>
    </nav>
    <h1>Agregar Persona</h1>

    {% if mensaje %}
    <div class="mensaje">{{ mensaje }}</div>
    {% endif %}

    <form method="POST" action="/escribir">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="apellido">Apellido</label>
        <input type="text" id="apellido" name="apellido" required>

        <label for="documento">Documento</label>
        <input type="number" id="documento" name="documento" required>

        <button type="submit">Guardar</button>
    </form>
</body>
</html>
